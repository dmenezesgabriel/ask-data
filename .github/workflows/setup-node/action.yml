name: setup-node

description: Setup Node.js, cache and install dependencies.

runs:
  using: composite
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 11.1.1
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'pnpm'
    # --frozen-lockfile lives here (not in each workflow's step list) so the lockfile
    # consistency check applies to every workflow that uses this composite action.
    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
